name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck src/claude-accounts.sh
        run: shellcheck -s bash src/claude-accounts.sh

  bats:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core
      - name: Run bats tests
        run: bats tests/claude-accounts.bats

  zsh-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Source the script in zsh and drive a mock claude
        run: |
          zsh <<'ZSH'
          set -e
          export CLAUDE_ACCOUNTS_HOME="$(mktemp -d)"
          export CLAUDE_ACCOUNTS_DEFAULT_DIR="$(mktemp -d)"
          mockbin="$(mktemp -d)"
          printf '%s\n' \
            '#!/usr/bin/env bash' \
            'echo "MOCK cfg=$CLAUDE_CONFIG_DIR acct=$CLAUDE_ACCOUNT args=$*"' \
            'exit "${MOCK_EXIT:-0}"' > "$mockbin/claude"
          chmod +x "$mockbin/claude"
          export PATH="$mockbin:$PATH"
          source src/claude-accounts.sh
          claude-account add x --no-login
          out="$(claude --account x -p hi)"
          print -r -- "$out"
          [[ "$out" == *"MOCK cfg=$CLAUDE_ACCOUNTS_HOME/profiles/x acct=x args=-p hi"* ]]
          ZSH

  pester:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester tests (Windows PowerShell 5.1)
        shell: powershell
        run: |
          Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0
          Invoke-Pester tests/ClaudeAccounts.Tests.ps1 -CI
      - name: cmd.exe shim smoke test
        shell: powershell
        run: .\tests\cmd-shim-smoke.ps1
